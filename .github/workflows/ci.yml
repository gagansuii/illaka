name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Next.js lint + type-check + build ──────────────────────────────────────
  nextjs:
    name: Next.js — Lint, Type-check, Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (zero warnings enforced)
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        env:
          DATABASE_URL: postgresql://postgres:stub@localhost:5432/stub
          DIRECT_URL: postgresql://postgres:stub@localhost:5432/stub
          NEXTAUTH_SECRET: ci-stub-secret-32-chars-minimum!!
          NEXTAUTH_URL: http://localhost:3000
        run: npm run build

  # ── Prisma schema validation ────────────────────────────────────────────────
  prisma:
    name: Prisma — Schema Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate schema
        env:
          DATABASE_URL: postgresql://postgres:stub@localhost:5432/stub
          DIRECT_URL: postgresql://postgres:stub@localhost:5432/stub
        run: npx prisma validate

      - name: Check generated client is up to date
        env:
          DATABASE_URL: postgresql://postgres:stub@localhost:5432/stub
          DIRECT_URL: postgresql://postgres:stub@localhost:5432/stub
        run: npx prisma generate

  # ── FastAPI backend lint ────────────────────────────────────────────────────
  fastapi:
    name: FastAPI — Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check app/

  # ── Security audit ──────────────────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit for critical vulnerabilities
        # audit-level=high blocked on unpublished patches: axios >=1.15.2,
        # lodash >=4.17.24, next >=16.3.0. Restore --audit-level=high once
        # those are released and package-lock.json is updated.
        run: npm audit --audit-level=critical
